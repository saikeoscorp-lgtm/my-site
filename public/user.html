<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Профиль пользователя</title>

  <link rel="icon" href="/image/favicon.svg" type="image/x-icon" />
  <link rel="stylesheet" href="/style.css" />
</head>

<body>
  <div class="topbar">
    <div class="top-bar-left">
      <a href="/index.html">
        <img src="/image/text-logo.svg" alt="logo" width="100" height="20">
      </a>
    </div>

    <div class="butt-top-right">
      <a href="/private/docs.html" class="button-top"><b>!docs</b></a>
      <a href="/private/profile.html" class="button-top"><b>Профиль</b></a>
      <a href="/login.html" class="button-top"><b>Вход</b></a>
      <a href="/registration.html" class="button-top"><b>Регистрация</b></a>
    </div>
  </div>

  <div class="container">
    <div id="status" class="status-box loading">Загрузка профиля...</div>

    <div id="profileBox" style="display:none;">
      <div class="public-profile-banner">
        <img id="bannerImage" src="/image/fa&te.svg" alt="banner">
      </div>

      <div class="public-profile-top">
        <div class="public-profile-left">
          <img
            id="avatarPreview"
            src="/image/no_avatar.svg"
            alt="avatar"
            class="public-avatar"
          >

          <div class="public-user-info">
            <h1 id="profileName">User</h1>

            <div id="achievementBadges" class="achievement-badges"></div>

            <div class="public-role">
              <span id="userRole">user</span>
            </div>
          </div>
        </div>

        <div class="public-profile-right">
          <button id="shareBtn" type="button">
            Поделиться профилем
          </button>
        </div>
      </div>

      <div class="card">
        <h2>О пользователе</h2>
        <p id="userBio">Пользователь пока ничего не написал о себе.</p>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const username = params.get("name");

    async function loadPublicProfile() {
      const status = document.getElementById("status");
      const profileBox = document.getElementById("profileBox");

      if (!username) {
        status.textContent = "Не указан username";
        return;
      }

      try {
        const res = await fetch(
          "/api/public/profile/" + encodeURIComponent(username)
        );

        const data = await res.json();

        if (!res.ok) {
          status.textContent = data.error || "Ошибка загрузки";
          return;
        }

        const user = data.user;
        const achievements = data.achievements || [];

        document.getElementById("profileName").textContent =
          user.username || "Unknown";

        document.getElementById("userRole").textContent =
          user.role || "user";

        document.getElementById("userBio").textContent =
          user.bio || "Пользователь пока ничего не написал о себе.";

        document.getElementById("avatarPreview").src =
          user.avatar_data ||
          user.avatar_url ||
          "/image/no_avatar.svg";

        document.getElementById("bannerImage").src =
          user.banner_data ||
          user.banner_url ||
          "/image/fa&te.svg";

        const badgesBox = document.getElementById("achievementBadges");

        badgesBox.innerHTML = achievements.map(a => {
          const icon = a.icon_url || "/image/achievements/default.svg";
          const title = a.title || "achievement";
          const description = a.description || "";

          return `
            <img
              class="achievement-badge"
              src="${icon}"
              alt="${title}"
              title="${title}${description ? " — " + description : ""}"
            >
          `;
        }).join("");

        status.style.display = "none";
        profileBox.style.display = "block";

      } catch (err) {
        console.error(err);
        status.textContent = "Ошибка сервера";
      }
    }

    document.

      }

    loadPublicProfile();
  </script>
</body>
</html>
