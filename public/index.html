<script>
fetch('/me')
  .then(res => res.json())
  .then(data => {
    const docsBtn = document.getElementById('docsBtn');
    const profileBtn = document.getElementById('profileBtn');
    const loginBtn = document.getElementById('loginBtn');
    const registerBtn = document.getElementById('registerBtn');
    const adminBtn = document.getElementById('adminBtn');
    const logoutBtn = document.getElementById('logoutBtn');

    if (!data.user) {
      if (docsBtn) docsBtn.style.display = 'none';
      if (profileBtn) profileBtn.style.display = 'none';
      if (adminBtn) adminBtn.style.display = 'none';
      if (logoutBtn) logoutBtn.style.display = 'none';

      if (loginBtn) loginBtn.style.display = 'inline-block';
      if (registerBtn) registerBtn.style.display = 'inline-block';
      return;
    }

    if (profileBtn) profileBtn.style.display = 'inline-block';
    if (logoutBtn) logoutBtn.style.display = 'inline-block';

    if (loginBtn) loginBtn.style.display = 'none';
    if (registerBtn) registerBtn.style.display = 'none';

    if (data.user.role === 'admin') {
      if (adminBtn) adminBtn.style.display = 'inline-block';
      if (docsBtn) docsBtn.style.display = 'inline-block';
    } else if (data.user.role === 'user') {
      if (adminBtn) adminBtn.style.display = 'none';
      if (docsBtn) docsBtn.style.display = 'inline-block';
    } else {
      if (adminBtn) adminBtn.style.display = 'none';
      if (docsBtn) docsBtn.style.display = 'none';
    }
  });

const logoutBtn = document.getElementById('logoutBtn');

if (logoutBtn) {
  logoutBtn.addEventListener('click', function(event) {
    event.preventDefault();

    fetch('/logout', {
      method: 'POST'
    })
    .then(res => res.json())
    .then(data => {
      alert(data.message);
      window.location.href = '/';
    });
  });
}
	async function loadUser() {
		const res = await fetch("/api/me");
		const data = await res.json();
		const status = document.getElementById("status");

		if (data.user) {
			status.innerHTML = `
				<p>Вы авторизирован: <b>${data.user.username}</b></p>
				<p>Роль: <b>${data.user.role}</b></p>
				<button onclick="logout()">Выход</button>
			`;
		} else {
			status.innerHTML = `
				<p>Вы не авторизированы</p>
			`;
		}
	}

async function logout() {
	await fetch("/api/logout", { method: "POST" });
	window.location.href = "/";
}

loadUser();
</script>
<script>
async function loadHeaderUser() {
  try {
    const res = await fetch("/api/me");
    const data = await res.json();

    if (!data.user) return;

    document.getElementById("guestBox").style.display = "none";
    document.getElementById("userBox").style.display = "flex";

    document.getElementById("headerUsername").textContent = data.user.username;

    document.getElementById("headerAvatar").src =
      data.user.avatar_data ||
      data.user.avatar_url ||
      "/image/text-logo.svg";

  } catch (err) {
    console.error("header load error", err);
  }
}

async function logout() {
  await fetch("/api/logout", { method: "POST" });
  location.reload();
}

loadHeaderUser();
</script>
