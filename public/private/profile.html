<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/favicon.svg" type="image/x-icon" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Профиль</title>
  <link rel="stylesheet" href="/style.css" />
</head>

<body>
  <div class="topbar">
    <div class="top-bar-left">
      <a href="/index.html">
        <img src="/image/text-logo.svg" alt="logo" width="100" height="20">
      </a>
    </div>

    <div class="butt-top-right">
      <a href="/private/docs.html" class="button-top" id="docsBtn"><b>!docs</b></a>
      <a href="/private/admin.html" class="button-top" id="adminBtn"><b>Админка</b></a>
      <a href="/login.html" class="button-top" id="loginBtn"><b>Вход</b></a>
      <a href="/registration.html" class="button-top" id="registerBtn"><b>Регистрация</b></a>
    </div>
  </div>

  <div class="container">
    <img src="/image/fa&te.svg" alt="Korvin" width="700" height="100">

    <center><h1>Профиль</h1></center>

    <div id="status" class="status-box">Ожидание...</div>

    <div class="card" id="profileCard" style="display:none;">
      <center>
        <img
          id="avatarPreview"
          src="/image/no_avatar.svg"
          alt="avatar"
          width="120"
          height="120"
          style="border-radius:50%; object-fit:cover; border:2px solid #555;"
        >
      </center>

      <p><b>ID:</b> <span id="userId"></span></p>
      <p><b>Роль:</b> <span id="userRole"></span></p>

      <label for="usernameInput">Логин</label>
      <input id="usernameInput" type="text" placeholder="Логин">

      <label for="emailInput">Email</label>
      <input id="emailInput" type="email" placeholder="Email">

      <label for="avatarInput">Фото профиля URL</label>
      <input id="avatarInput" type="text" placeholder="https://example.com/avatar.png">

      <label for="avatarFileInput">Загрузить фото</label>
      <input id="avatarFileInput" type="file" accept="image/*">

      <label for="bioInput">О себе</label>
      <textarea id="bioInput" rows="4" placeholder="Расскажи о себе"></textarea>
      
      <p></p>

      <input id="oldPassword" type="password" placeholder="Старый пароль">
<input id="newPassword" type="password" placeholder="Новый пароль">
<button type="button" id="changePasswordBtn">Сменить пароль</button>

      <br><br>

      <button type="button" id="saveBtn">Сохранить</button>
    </div>
  </div>

  <script>
    let avatarData = "";

    async function loadProfile() {
      const status = document.getElementById("status");
      const card = document.getElementById("profileCard");

      try {
        const res = await fetch("/api/me");
        const data = await res.json();

        if (!data.user) {
          status.textContent = "Ты не вошёл в аккаунт";
          card.style.display = "none";
          return;
        }

        const user = data.user;

        status.textContent = "Профиль загружен";
        card.style.display = "block";

        document.getElementById("userId").textContent = user.id;
        document.getElementById("userRole").textContent = user.role;

        document.getElementById("usernameInput").value = user.username || "";
        document.getElementById("emailInput").value = user.email || "";
        document.getElementById("bioInput").value = user.bio || "";
        document.getElementById("avatarInput").value = user.avatar_url || "";

        avatarData = user.avatar_data || "";

        document.getElementById("avatarPreview").src =
          user.avatar_data ||
          user.avatar_url ||
          "/image/text-logo.svg";

      } catch (err) {
        console.error(err);
        status.textContent = "Ошибка загрузки профиля";
      }
    }

    document.getElementById("avatarInput").addEventListener("input", function () {
      if (this.value) {
        avatarData = "";
        document.getElementById("avatarPreview").src = this.value;
      } else {
        document.getElementById("avatarPreview").src = avatarData || "/image/text-logo.svg";
      }
    });
    
    const changePasswordBtn = document.getElementById("changePasswordBtn");

if (changePasswordBtn) {
  changePasswordBtn.onclick = async function () {
    const status = document.getElementById("status");

    const payload = {
      oldPassword: document.getElementById("oldPassword").value,
      newPassword: document.getElementById("newPassword").value
    };

    status.textContent = "Меняю пароль...";

    const res = await fetch("/api/change-password", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    });

    const data = await res.json();

    if (!res.ok) {
      status.textContent = data.error || "Ошибка смены пароля";
      return;
    }

    status.textContent = "Пароль изменён";
    alert("Пароль изменён");
  };
}

loadProfile();

    document.getElementById("avatarFileInput").addEventListener("change", function () {
      const file = this.files[0];

      if (!file) return;

      if (file.size > 2 * 1024 * 1024) {
        alert("Фото слишком большое. Максимум 2 МБ");
        this.value = "";
        return;
      }

      const reader = new FileReader();

      reader.onload = function () {
        avatarData = reader.result;
        document.getElementById("avatarInput").value = "";
        document.getElementById("avatarPreview").src = avatarData;
      };

      reader.readAsDataURL(file);
    });
    
    document.getElementById("saveBtn").onclick = async function () {
      const status = document.getElementById("status");

      status.textContent = "Сохраняю...";

      const payload = {
        username: document.getElementById("usernameInput").value.trim(),
        email: document.getElementById("emailInput").value.trim(),
        bio: document.getElementById("bioInput").value,
        avatar_url: document.getElementById("avatarInput").value.trim(),
        avatar_data: avatarData || ""
      };

      try {
        const res = await fetch("/api/profile/update", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (!res.ok) {
          status.textContent = data.error || "Ошибка сохранения";
          alert(data.error || "Ошибка сохранения");
          return;
        }

        status.textContent = "Профиль сохранён";
        alert("Сохранено");
        await loadProfile();

      } catch (err) {
        console.error(err);
        status.textContent = "Ошибка запроса";
        alert("Ошибка запроса");
      }
    };

    loadProfile();
  </script>
</body>
</html>
