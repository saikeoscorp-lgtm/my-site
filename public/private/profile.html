<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/image/favicon.svg" type="image/x-icon" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Профиль</title>
  <link rel="stylesheet" href="/style.css" />
</head>

<body>
  <div class="topbar">
    <div class="top-bar-left">
      <a href="/index.html">
        <img src="/image/text-logo.svg" alt="logo" width="100" height="20">
      </a>
    </div>

    <div class="butt-top-right">
      <a href="/private/docs.html" class="button-top"><b>!docs</b></a>
      <a href="/private/admin.html" class="button-top"><b>Админка</b></a>
      <a href="/private/devices.html" class="button-top"><b>ESP</b></a>
      <a href="/login.html" class="button-top"><b>Вход</b></a>
    </div>
  </div>

  <div class="container">
    <img src="/image/fa&te.svg" alt="Korvin" width="700" height="100">

    <h1>Профиль</h1>

    <div id="status" class="status-box">Ожидание...</div>

   <div id="profileCard" class="profile-layout" style="display:none;">

      <div class="card">
        <center>
          <img
            id="avatarPreview"
            src="/image/no_avatar.svg"
            alt="avatar"
            width="130"
            height="130"
            style="border-radius:50%; object-fit:cover; border:3px solid #f2b759;"
          >

          <h2 id="profileName">Пользователь</h2>
          <p><b>ID:</b> <span id="userId"></span></p>
          <p><b>Роль:</b> <span id="userRole"></span></p>
        </center>
      </div>

      <div class="card">
        <h3>Основная информация</h3>

        <label for="usernameInput">Логин</label>
        <input id="usernameInput" type="text" placeholder="Логин">

        <label for="emailInput">Email</label>
        <input id="emailInput" type="email" placeholder="Email">

        <label for="bioInput">О себе</label>
        <textarea id="bioInput" rows="4" placeholder="Расскажи о себе"></textarea>

        <button type="button" id="saveBtn">Сохранить профиль</button>
      </div>

      <div class="card">
        <h3>Фото профиля</h3>

        <label for="avatarInput">Фото по URL</label>
        <input id="avatarInput" type="text" placeholder="https://example.com/avatar.png">

        <label for="avatarFileInput">Или загрузить фото</label>
        <input id="avatarFileInput" type="file" accept="image/*">

        <p style="color:#9ca3af;">Максимальный размер файла: 2 МБ</p>
      </div>

      <div class="card">
        <h3>Смена пароля</h3>

        <input id="oldPassword" type="password" placeholder="Старый пароль">
        <input id="newPassword" type="password" placeholder="Новый пароль">

        <button type="button" id="changePasswordBtn">Сменить пароль</button>
      </div>

    </div>
  </div>

  <script>
    let avatarData = "";

    function setStatus(text) {
      document.getElementById("status").textContent = text;
    }

    async function loadProfile() {
      const card = document.getElementById("profileCard");

      try {
        const res = await fetch("/api/me");
        const data = await res.json();

        if (!data.user) {
          setStatus("Ты не вошёл в аккаунт");
          card.style.display = "none";
          return;
        }

        const user = data.user;

        setStatus("Профиль загружен");
        card.style.display = "block";

        document.getElementById("userId").textContent = user.id;
        document.getElementById("userRole").textContent = user.role;
        document.getElementById("profileName").textContent = user.username || "Пользователь";

        document.getElementById("usernameInput").value = user.username || "";
        document.getElementById("emailInput").value = user.email || "";
        document.getElementById("bioInput").value = user.bio || "";
        document.getElementById("avatarInput").value = user.avatar_url || "";

        avatarData = user.avatar_data || "";

        document.getElementById("avatarPreview").src =
          user.avatar_data ||
          user.avatar_url ||
          "/image/no_avatar.svg";

      } catch (err) {
        console.error(err);
        setStatus("Ошибка загрузки профиля");
      }
    }

    document.getElementById("avatarInput").addEventListener("input", function () {
      if (this.value.trim()) {
        avatarData = "";
        document.getElementById("avatarPreview").src = this.value.trim();
      } else {
        document.getElementById("avatarPreview").src = avatarData || "/image/no_avatar.svg";
      }
    });

    document.getElementById("avatarFileInput").addEventListener("change", function () {
      const file = this.files[0];

      if (!file) return;

      if (file.size > 2 * 1024 * 1024) {
        alert("Фото слишком большое. Максимум 2 МБ");
        this.value = "";
        return;
      }

      const reader = new FileReader();

      reader.onload = function () {
        avatarData = reader.result;
        document.getElementById("avatarInput").value = "";
        document.getElementById("avatarPreview").src = avatarData;
      };

      reader.readAsDataURL(file);
    });

    document.getElementById("saveBtn").onclick = async function () {
      const payload = {
        username: document.getElementById("usernameInput").value.trim(),
        email: document.getElementById("emailInput").value.trim(),
        bio: document.getElementById("bioInput").value,
        avatar_url: document.getElementById("avatarInput").value.trim(),
        avatar_data: avatarData || ""
      };

      if (!payload.username || !payload.email) {
        setStatus("Логин и email обязательны");
        return;
      }

      try {
        setStatus("Сохраняю...");

        const res = await fetch("/api/profile/update", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (!res.ok) {
          setStatus(data.error || "Ошибка сохранения");
          alert(data.error || "Ошибка сохранения");
          return;
        }

        setStatus("Профиль сохранён");
        await loadProfile();

      } catch (err) {
        console.error(err);
        setStatus("Ошибка запроса");
      }
    };

    document.getElementById("changePasswordBtn").onclick = async function () {
      const oldPassword = document.getElementById("oldPassword").value;
      const newPassword = document.getElementById("newPassword").value;

      if (!oldPassword || !newPassword) {
        setStatus("Заполни оба поля пароля");
        return;
      }

      if (newPassword.length < 5) {
        setStatus("Новый пароль слишком короткий");
        return;
      }

      try {
        setStatus("Меняю пароль...");

        const res = await fetch("/api/change-password", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ oldPassword, newPassword })
        });

        const data = await res.json();

        if (!res.ok) {
          setStatus(data.error || "Ошибка смены пароля");
          return;
        }

        document.getElementById("oldPassword").value = "";
        document.getElementById("newPassword").value = "";

        setStatus("Пароль изменён");

      } catch (err) {
        console.error(err);
        setStatus("Ошибка запроса");
      }
    };

    loadProfile();
  </script>
</body>
</html>
