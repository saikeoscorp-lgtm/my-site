<script>
	async function loadProfile() {
  const status = document.getElementById('status');
  const content = document.getElementById('content');

  try {
    const res = await fetch('/api/me');
    const data = await res.json();

    if (!data.user) {
      status.textContent = 'Ты не вошёл в аккаунт';
      content.innerHTML = '';
      return;
    }

    status.textContent = 'Профиль загружен';
    content.innerHTML = `
      <p><b>ID:</b> ${data.user.id}</p>
      <p><b>Логин:</b> ${data.user.username}</p>
      <p><b>Email:</b> ${data.user.email}</p>
      <p><b>Роль:</b> ${data.user.role}</p>
    `;
  } catch (err) {
    status.textContent = 'Ошибка загрузки профиля';
  }
}

loadProfile();
