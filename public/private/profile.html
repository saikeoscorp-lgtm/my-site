<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/favicon.svg" type="image/x-icon" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Профиль</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="topbar">
    <div class="top-bar-left">
      <a href="/index.html">
        <img src="/image/text-logo.svg" alt="logo" width="100" height="20">
      </a>
    </div>

    <div class="butt-top-right">
      <a href="/private/docs.html" class="button-top" id="docsBtn"><b>!docs</b></a>
      <a href="/private/admin.html" class="button-top" id="adminBtn"><b>Админка</b></a>
      <a href="/login.html" class="button-top" id="loginBtn"><b>Вход</b></a>
      <a href="/registration.html" class="button-top" id="registerBtn"><b>Регистрация</b></a>
    </div>
  </div>

  <div class="container">
    <img src="/image/fa&te.svg" alt="Korvin" width="700" height="100">

    <center><h1>Профиль</h1></center>

    <div id="status" class="status-box">Ожидание...</div>

    <div class="card" id="profileCard" style="display:none;">
      <center>
        <img
          id="avatarPreview"
          src="/image/default-avatar.svg"
          alt="avatar"
          width="120"
          height="120"
          style="border-radius: 50%; object-fit: cover; border: 2px solid #555;"
        >
      </center>

      <p><b>ID:</b> <span id="userId"></span></p>
      <p><b>Роль:</b> <span id="userRole"></span></p>

      <label>Логин</label>
      <input id="usernameInput" type="text" placeholder="Логин">

      <label>Email</label>
      <input id="emailInput" type="email" placeholder="Email">

      <label>Фото профиля URL</label>
      <input id="avatarInput" type="text" placeholder="https://example.com/avatar.png">

      <label>Загрузить фото</label>
<input id="avatarFileInput" type="file" accept="image/*">

      <label>О себе</label>
      <textarea id="bioInput" rows="4" placeholder="Расскажи о себе"></textarea>

      <br><br>

      <button id="saveBtn">Сохранить</button>
    </div>
  </div>

  <script>
    async function loadProfile() {
      const status = document.getElementById("status");
      const card = document.getElementById("profileCard");

      try {
        const res = await fetch("/api/me");
        const data = await res.json();

        if (!data.user) {
          status.textContent = "Ты не вошёл в аккаунт";
          card.style.display = "none";
          return;
        }

        const user = data.user;

        status.textContent = "Профиль загружен";
        card.style.display = "block";

        document.getElementById("userId").textContent = user.id;
        document.getElementById("userRole").textContent = user.role;

        document.getElementById("usernameInput").value = user.username || "";
        document.getElementById("emailInput").value = user.email || "";
        document.getElementById("bioInput").value = user.bio || "";
        document.getElementById("avatarInput").value = user.avatar_url || "";

        document.getElementById("avatarPreview").src =
          user.avatar_url || "/image/default-avatar.svg";

      } catch (err) {
        status.textContent = "Ошибка загрузки профиля";
      }
    }

    document.getElementById("avatarInput").addEventListener("input", function () {
      document.getElementById("avatarPreview").src =
        this.value || "/image/default-avatar.svg";
    });

    document.getElementById("saveBtn").addEventListener("click", async () => {
      const status = document.getElementById("status");

      const payload = {
        username: document.getElementById("usernameInput").value,
        email: document.getElementById("emailInput").value,
        bio: document.getElementById("bioInput").value,
        avatar_url: document.getElementById("avatarInput").value
      };

      try {
        const res = await fetch("/api/profile/update", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (!res.ok) {
          status.textContent = data.error || "Ошибка сохранения";
          return;
        }

        status.textContent = "Профиль сохранён";
        loadProfile();
      } catch (err) {
        status.textContent = "Ошибка сервера";
      }
    });

    loadProfile();
  </script>
</body>
</html>
