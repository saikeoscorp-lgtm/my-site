<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/image/favicon.svg" type="image/x-icon" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Редактирование профиля</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<script>
  function toggleMobileMenu() {
    document.getElementById("navLinks").classList.toggle("open");
  }
</script>
<body>
	<div class="topbar">
    <div class="top-bar-left">
      <a href="/index.html">
        <img src="/image/text-logo.svg" alt="logo" width="100" height="20">
      </a>
    </div>

	<div class="butt-top-right">
  <button class="mobile-menu-btn" type="button" onclick="toggleMobileMenu()">
    Меню ☰
  </button>

  <div class="nav-links" id="navLinks">
    <a href="/private/docs.html" class="button-top"><b>!docs</b></a>
    <a id="publicProfileLink" class="button-top" href="#"><b>Публичный профиль</b></a>
    <a href="/login.html" class="button-top"><b>Вход</b></a>
    <a href="/registration.html" class="button-top"><b>Регистрация</b></a>
	</div>
  </div>
</div>

  <div class="container">
    <h1>Редактирование профиля</h1>

    <div id="status" class="status-box">Ожидание...</div>

    <div id="profileCard" class="profile-layout" style="display:none;">

      <div class="card">
        <center>
          <img
            id="avatarPreview"
            src="/image/no_avatar.svg"
            alt="avatar"
            width="130"
            height="130"
          >

          <h2 id="profileName">Пользователь</h2>
          <p><b>ID:</b> <span id="userId"></span></p>
          <p><b>Роль:</b> <span id="userRole"></span></p>
        </center>
      </div>

      <div class="card">
        <h3>Основная информация</h3>

        <label for="usernameInput">Логин</label>
        <input id="usernameInput" type="text" placeholder="Логин">

        <label for="emailInput">Email</label>
        <input id="emailInput" type="email" placeholder="Email">

        <label for="bioInput">О себе</label>
        <textarea id="bioInput" rows="4" placeholder="Расскажи о себе"></textarea>

        <button type="button" id="saveBtn">Сохранить профиль</button>
      </div>

      <div class="card">
        <h3>Фото профиля</h3>

        <label for="avatarInput">Фото по URL</label>
        <input id="avatarInput" type="text" placeholder="https://example.com/avatar.png">

        <label for="avatarFileInput">Или загрузить фото</label>
        <input id="avatarFileInput" type="file" accept="image/*">

        <p style="color:#9ca3af;">Максимальный размер файла: 2 МБ</p>
      </div>

      <div class="card">
        <h3>Баннер профиля</h3>

        <div
          id="bannerPreview"
          style="width:100%; height:140px; border-radius:16px; background:#111827; background-size:cover; background-position:center; border:1px solid #374151; margin-bottom:14px;"
        ></div>

        <label for="bannerInput">Баннер по URL</label>
        <input id="bannerInput" type="text" placeholder="https://example.com/banner.png">

        <label for="bannerFileInput">Или загрузить баннер</label>
        <input id="bannerFileInput" type="file" accept="image/*">

        <p style="color:#9ca3af;">Максимальный размер файла: 2 МБ</p>
      </div>

      <div class="card">
        <h3>Смена пароля</h3>

        <input id="oldPassword" type="password" placeholder="Старый пароль">
        <input id="newPassword" type="password" placeholder="Новый пароль">

        <button type="button" id="changePasswordBtn">Сменить пароль</button>
      </div>

    </div>
  </div>

  <script>
    let avatarData = "";
    let bannerData = "";

    function setStatus(text) {
      document.getElementById("status").textContent = text;
    }

    function updateBannerPreview(src) {
      const bannerPreview = document.getElementById("bannerPreview");

      if (src) {
        bannerPreview.style.backgroundImage = `url("${src}")`;
      } else {
        bannerPreview.style.backgroundImage = "url('/image/fa&te.svg')";
      }
    }

    async function loadProfile() {
      const card = document.getElementById("profileCard");

      try {
        const res = await fetch("/api/me");
        const data = await res.json();

        if (!data.user) {
          setStatus("Ты не вошёл в аккаунт");
          card.style.display = "none";
          return;
        }

        const user = data.user;

        const publicProfileLink = document.getElementById("publicProfileLink");
        if (publicProfileLink) {
          publicProfileLink.href =
            "/user.html?name=" + encodeURIComponent(user.username);
        }

        setStatus("Профиль загружен");
        card.style.display = "grid";

        document.getElementById("userId").textContent = user.id;
        document.getElementById("userRole").textContent = user.role;
        document.getElementById("profileName").textContent = user.username || "Пользователь";

        document.getElementById("usernameInput").value = user.username || "";
        document.getElementById("emailInput").value = user.email || "";
        document.getElementById("bioInput").value = user.bio || "";
        document.getElementById("avatarInput").value = user.avatar_url || "";
        document.getElementById("bannerInput").value = user.banner_url || "";

        avatarData = user.avatar_data || "";
        bannerData = user.banner_data || "";

        document.getElementById("avatarPreview").src =
          user.avatar_data ||
          user.avatar_url ||
          "/image/no_avatar.svg";

        updateBannerPreview(
          user.banner_data ||
          user.banner_url ||
          "/image/fa&te.svg"
        );

      } catch (err) {
        console.error(err);
        setStatus("Ошибка загрузки профиля");
      }
    }

    document.getElementById("avatarInput").addEventListener("input", function () {
      const value = this.value.trim();

      if (value) {
        avatarData = "";
        document.getElementById("avatarPreview").src = value;
      } else {
        document.getElementById("avatarPreview").src =
          avatarData || "/image/no_avatar.svg";
      }
    });

    document.getElementById("avatarFileInput").addEventListener("change", async function () {
  const file = this.files[0];
  if (!file) return;

  const formData = new FormData();
  formData.append("image", file);
  formData.append("type", "avatar");

  setStatus("Загружаю аватар...");

  const res = await fetch("/api/profile/upload-image", {
    method: "POST",
    body: formData
  });

  const data = await res.json();

  if (!res.ok) {
    setStatus(data.error || "Ошибка загрузки аватара");
    return;
  }

  document.getElementById("avatarInput").value = data.url;
  document.getElementById("avatarPreview").src = data.url;

  avatarData = "";
  setStatus("Аватар загружен");
});

    document.getElementById("bannerInput").addEventListener("input", function () {
      const value = this.value.trim();

      if (value) {
        bannerData = "";
        updateBannerPreview(value);
      } else {
        updateBannerPreview(bannerData || "/image/fa&te.svg");
      }
    });

    document.getElementById("bannerFileInput").addEventListener("change", async function () {
  const file = this.files[0];
  if (!file) return;

  const formData = new FormData();
  formData.append("image", file);
  formData.append("type", "banner");

  setStatus("Загружаю баннер...");

  const res = await fetch("/api/profile/upload-image", {
    method: "POST",
    body: formData
  });

  const data = await res.json();

  if (!res.ok) {
    setStatus(data.error || "Ошибка загрузки баннера");
    return;
  }

  document.getElementById("bannerInput").value = data.url;
  updateBannerPreview(data.url);

  bannerData = "";
  setStatus("Баннер загружен");
});

    document.getElementById("saveBtn").onclick = async function () {
      const payload = {
  username: document.getElementById("usernameInput").value.trim(),
  email: document.getElementById("emailInput").value.trim(),
  bio: document.getElementById("bioInput").value,
  avatar_url: document.getElementById("avatarInput").value.trim(),
  avatar_data: "",
  banner_url: document.getElementById("bannerInput").value.trim(),
  banner_data: ""
};

      if (!payload.username || !payload.email) {
        setStatus("Логин и email обязательны");
        return;
      }

      try {
        setStatus("Сохраняю...");

        const res = await fetch("/api/profile/update", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (!res.ok) {
          setStatus(data.error || "Ошибка сохранения");
          alert(data.error || "Ошибка сохранения");
          return;
        }

        setStatus("Профиль сохранён");
        await loadProfile();

      } catch (err) {
        console.error(err);
        setStatus("Ошибка запроса");
      }
    };

    document.getElementById("changePasswordBtn").onclick = async function () {
      const oldPassword = document.getElementById("oldPassword").value;
      const newPassword = document.getElementById("newPassword").value;

      if (!oldPassword || !newPassword) {
        setStatus("Заполни оба поля пароля");
        return;
      }

      if (newPassword.length < 5) {
        setStatus("Новый пароль слишком короткий");
        return;
      }

      try {
        setStatus("Меняю пароль...");

        const res = await fetch("/api/change-password", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ oldPassword, newPassword })
        });

        const data = await res.json();

        if (!res.ok) {
          setStatus(data.error || "Ошибка смены пароля");
          return;
        }

        document.getElementById("oldPassword").value = "";
        document.getElementById("newPassword").value = "";

        setStatus("Пароль изменён");

      } catch (err) {
        console.error(err);
        setStatus("Ошибка запроса");
      }
    };

    loadProfile();
  </script>
</body>
</html>
