<DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8" />
	    <link rel="icon" href="/image/favicon.svg" type="image/x-icon" />
	    <meta name="viwport" content="width=device-width, initial-scale=1.0" />
	    <title>Панель Управления ESP32C3</title>
	    <link rel="stylesheet" href="/style.css" />
</head>
<body>
	<div class="topbar">
		<div class="top-bar-left">
			<div>
			<a href="/index.html"><img src="/image/text-logo.svg" alt="logo" width="100" height="20"></a>
			</div>

		</div>

		<div class="butt-top-right">
			<a href="/private/docs.html" class="button-top" id="docsBtn"><b>!docs</b></a>
			<a href="/private/profile.html" class="button-top" id="profileBtn"><b>Профиль</b></a>
			<a href="/login.html" class="button-top" id="loginBtn"><b>Вход</b></a>
			<a href="/registration.html" class="button-top" id="registerBtn"><b>Регистрация</b></a>
		</div>
	</div>
	
	<div class="container">
    <h1>ESP устройства</h1>

    <div id="status">Загрузка...</div>
    <div id="devices"></div>
  </div>

  <script>
    async function loadDevices() {
      const status = document.getElementById("status");
      const box = document.getElementById("devices");

      try {
        const res = await fetch("/api/admin/devices");
        const data = await res.json();

        if (!res.ok) {
          status.textContent = data.error || "Ошибка";
          return;
        }

        status.textContent = "Устройства загружены";

        if (!data.devices.length) {
          box.innerHTML = "<p>Устройств пока нет</p>";
          return;
        }

        box.innerHTML = data.devices.map(d => {
          const online =
            d.last_ping &&
            Date.now() - new Date(d.last_ping).getTime() < 30000;

          return `
            <div class="card">
              <h3>${d.device_id}</h3>
              <p><b>Статус:</b> ${online ? "🟢 Online" : "🔴 Offline"}</p>
              <p><b>Температура:</b> ${d.temperature || "-"}</p>
              <p><b>Last ping:</b> ${d.last_ping || "-"}</p>
              <p><b>User ID:</b> ${d.user_id || "не привязан"}</p>
              <p><b>Владелец:</b> ${d.username || "-"} ${d.email ? "(" + d.email + ")" : ""}</p>

              <button onclick="openDevice('${d.device_id}')">
                Открыть
              </button>
            </div>
          `;
        }).join("");

      } catch (err) {
        console.error(err);
        status.textContent = "Ошибка запроса";
      }
    }

    function openDevice(deviceId) {
      window.location.href = "/private/esp.html?device=" + encodeURIComponent(deviceId);
    }

    loadDevices();
    setInterval(loadDevices, 5000);
  </script>
</body>
</html>
