<DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8" />
	    <link rel="icon" href="/image/favicon.svg" type="image/x-icon" />
	    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
	    <title>Панель Администратора</title>
	    <link rel="stylesheet" href="/style.css" />
</head>
<body>
	<div class="topbar">
		<div class="top-bar-left">
			<div>
			<a href="/index.html"><img src="/image/text-logo.svg" alt="logo" width="100" height="20"></a>
			</div>

		</div>

		<div class="butt-top-right">
			<a href="/private/devices.html" class="button-top" id="docsBtn"><b>ESPs</b></a>
			<a href="/private/profile.html" class="button-top" id="profileBtn"><b>Профиль</b></a>
			<a href="/login.html" class="button-top" id="loginBtn"><b>Вход</b></a>
			<a href="/registration.html" class="button-top" id="registerBtn"><b>Регистрация</b></a>
		</div>
	</div>

	<div class="container">
		<img src="/image/adminLogo.svg" alt="admin" width="700" height="100">
		<h1>Панель Администратора</h1>
		<div id="content">Загрузка...</div>
		<div class="nav" id="nav">
		<!-- <p><a href="/"><button>На главную</button></a></p> -->
		</div>
	</div>

<script>
async function changeRole(userId, role) {
  const res = await fetch("/api/admin/change-role", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ userId, role })
  });

  const data = await res.json();
  alert(data.message || data.error);
  loadAdmin();
}

async function deleteUser(userId) {
  const ok = confirm("Delete this user?");
  if (!ok) return;

  const res = await fetch("/api/admin/delete-user", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ userId })
  });

  const data = await res.json();
  alert(data.message || data.error);
  loadAdmin();
}

async function loadAdmin() {
  const content = document.getElementById("content");

  try {
    const res = await fetch("/api/admin");
    const data = await res.json();

    if (!res.ok) {
      content.innerHTML = `<p>${data.error}</p>`;
      return;
    }

    const userHtml = data.allUsers.map(user => `
      <li>
        <b>${user.username}</b> (${user.email}) - <b>${user.role}</b>
        <br>
        <button onclick="changeRole(${user.id}, 'admin')">Сделать Админом</button>
        <button onclick="changeRole(${user.id}, 'user')">Сделать Пользователем</button>
        <button onclick="changeRole(${user.id}, 'viewer')">Сделать Гостем</button>
		<button onclick="changeRole(${user.id}, 'device_user')">esp</button>
        <button onclick="deleteUser(${user.id})">Удалить</button>
      </li>
    `).join("");

    content.innerHTML = `
      <p>Ты вошёл как <b>${data.user.username}</b></p>
      <h3>Все пользователи:</h3>
      <ul>${userHtml}</ul>
    `;
  } catch (error) {
    content.innerHTML = `<p>Ошибка загрузки: ${error.message}</p>`;
  }
}

loadAdmin();
</script>
</body>
</html>
