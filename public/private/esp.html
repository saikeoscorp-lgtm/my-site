<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/image/favicon.svg" type="image/x-icon" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Панель Управления ESP32C3</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<script>
  function toggleMobileMenu() {
    document.getElementById("navLinks").classList.toggle("open");
  }
</script>
<body>
  <div class="topbar">
    <div class="top-bar-left">
      <a href="/index.html">
        <img src="/image/text-logo.svg" alt="logo" width="100" height="20">
      </a>
    </div>

    <div class="butt-top-right">
  <button class="mobile-menu-btn" type="button" onclick="toggleMobileMenu()">
    Меню ☰
  </button>

  <div class="nav-links" id="navLinks">
    <a href="/private/docs.html" class="button-top"><b>!docs</b></a>
    <a href="/private/profile.html" class="button-top"><b>Профиль</b></a>
    <a href="/login.html" class="button-top"><b>Вход</b></a>
    <a href="/registration.html" class="button-top"><b>Регистрация</b></a>
  </div>
</div>

  <div class="container">
    <h2>ESP устройство</h2>

    <div class="card">
      <p><b>ID:</b> <span id="deviceId">...</span></p>
      <p><b>Статус:</b> <span id="status">...</span></p>
      <p><b>Температура:</b> <span id="temp">...</span></p>
      <p><b>Последний пинг:</b> <span id="lastPing">...</span></p>

      <button onclick="sendCommand('LED_ON')">ON</button>
      <button onclick="sendCommand('LED_OFF')">OFF</button>
    </div>

    <h3>Logs</h3>
    <div id="logs" style="max-height:200px; overflow:auto; border:1px solid #ccc; padding:10px;">
      Loading...
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const deviceId = params.get("device") || "esp-001";

    document.getElementById("deviceId").innerText = deviceId;

    async function loadStatus() {
      try {
        const res = await fetch("/api/admin/device-status/" + encodeURIComponent(deviceId));
        const data = await res.json();

        if (!res.ok) {
          document.getElementById("status").innerText = data.error || "Ошибка";
          return;
        }

        document.getElementById("status").innerText = data.online ? "🟢 Online" : "🔴 Offline";
        document.getElementById("temp").innerText = data.temperature ?? "-";
        document.getElementById("lastPing").innerText = data.lastPing || "-";
      } catch (e) {
        console.error(e);
        document.getElementById("status").innerText = "Ошибка запроса";
      }
    }

    async function loadLogs() {
      try {
        const res = await fetch("/api/admin/device-logs/" + encodeURIComponent(deviceId));
        const data = await res.json();

        const logsDiv = document.getElementById("logs");

        if (!res.ok) {
          logsDiv.innerHTML = data.error || "Ошибка логов";
          return;
        }

        if (!data.logs.length) {
          logsDiv.innerHTML = "Логов нет";
          return;
        }

        logsDiv.innerHTML = data.logs
          .map(l => `<div>🕒 ${new Date(l.created_at).toLocaleString()} — ${l.message}</div>`)
          .join("");
      } catch (e) {
        console.error(e);
      }
    }

    async function sendCommand(command) {
      const res = await fetch("/api/admin/device-command", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          deviceId,
          command
        })
      });

      const data = await res.json();

      if (!res.ok) {
        alert(data.error || "Ошибка команды");
        return;
      }

      alert("Команда отправлена: " + command);
    }

    loadStatus();
    loadLogs();

    setInterval(loadStatus, 3000);
    setInterval(loadLogs, 5000);
  </script>
</body>
</html>
