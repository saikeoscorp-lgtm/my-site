<DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8" />
	    <link rel="icon" href="/image/favicon.svg" type="image/x-icon" />
	    <meta name="viwport" content="width=device-width, initial-scale=1.0" />
	    <title>Панель Управления ESP32C3</title>
	    <link rel="stylesheet" href="/style.css" />
</head>
<body>
	<div class="topbar">
		<div class="top-bar-left">
			<div>
			<a href="/index.html"><img src="/image/text-logo.svg" alt="logo" width="100" height="20"></a>
			</div>

		</div>

		<div class="butt-top-right">
			<a href="/private/docs.html" class="button-top" id="docsBtn"><b>!docs</b></a>
			<a href="/private/profile.html" class="button-top" id="profileBtn"><b>Профиль</b></a>
			<a href="/login.html" class="button-top" id="loginBtn"><b>Вход</b></a>
			<a href="/registration.html" class="button-top" id="registerBtn"><b>Регистрация</b></a>
		</div>
	</div>

	<div class="container">
    <h2>ESP Devices</h2>

    <div>
      <p><b>ID:</b> esp-001</p>
      <p><b>Статус:</b> <span id="status">...</span></p>
      <p><b>Последний пинг:</b> <span id="lastPing">...</span></p>
    </div>

    <hr>

    <div>
      <button onclick="sendCommand('LED_ON')">ON</button>
      <button onclick="sendCommand('LED_OFF')">OFF</button>
    </div>

	<hr>

		<h3>Logs</h3>

		<div id="logs" style="max-height:200px; overflow:auto; border:1px solid #ccc; padding:10px;">
			Loading...
		
	</div>

<script>
async function loadStatus() {

  try {

    const res = await fetch("/api/device/status/esp-001");

    const data = await res.json();

    document.getElementById("status").innerText = data.online ? "🟢 Online" : "🔴 Offline";

    document.getElementById("temp").innerText = data.temperature || "-";

    document.getElementById("lastPing").innerText = data.lastPing || "-";

  } catch (e) {

    console.error(e);

  }

}

async function loadLogs() {
  try {
    const res = await fetch("/api/device/logs/esp-001");
    const data = await res.json();

    const logsDiv = document.getElementById("logs");

    if (!data.logs.length) {
      logsDiv.innerHTML = "Логов нет";
      return;
    }

    logsDiv.innerHTML = data.logs
      .map(l => `<div>🕒 ${new Date(l.created_at).toLocaleString()} — ${l.message}</div>`)
      .join("");

  } catch (e) {
    console.error(e);
  }
}

async function sendCommand(cmd) {

  try {

    await fetch("/api/device/command", {

      method: "POST",

      headers: {

        "Content-Type": "application/json"

      },

      body: JSON.stringify({

        deviceId: "esp-001",

        command: cmd

      })

    });

    alert("Команда отправлена: " + cmd);

  } catch (e) {

    console.error(e);

  }

}

// автообновление каждые 3 сек

setInterval(loadStatus, 3000);

// первая загрузка

loadStatus();
</script>
</body>
</html>
