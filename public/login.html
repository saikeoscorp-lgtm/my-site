	<div class="container">
		<img src="image/fa&te.svg" alt="Korvin" width="700" height="100">
		<center><h1>Вход</h1></center>
		
	
		<div class="card">
		<form id="loginForm">
		 <input type="text" id="loginInput" placeholder="Логин или Почта" />
		 <input type="password" id="passwordInput" placeholder="Пароль"  />
		 <button type="submit" id="loginBtn">Вход</button>
		</form>
		<!-- <label>
		<input type="checkbox" > Запомнить
		</label> -->
		</div>

		<!-- <p><a href="/"><button>На главную</button></a></p> -->

		<div id="message"></div>
</div>

<script>
const loginForm = document.getElementById('loginForm');
const loginInput = document.getElementById('loginInput');
const passwordInput = document.getElementById('passwordInput');
const message = document.getElementById('message');

if (loginForm) {
  loginForm.addEventListener('submit', async function(event) {
    event.preventDefault();

    const login = loginInput.value.trim();
    const password = passwordInput.value.trim();

    if (!login || !password) {
      message.textContent = 'Заполни логин и пароль';
      return;
    }

    try {
      const res = await fetch('/login', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ login, password })
      });

      const data = await res.json();

      if (!res.ok) {
        message.textContent = data.error || 'Ошибка входа';
        return;
      }

      message.textContent = data.message || 'Вход выполнен';
      window.location.href = '/index.html';
    } catch (error) {
      message.textContent = 'Ошибка соединения с сервером';
    }
  });
}
