<DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8" />
	    <link rel="icon" href="image/favicon.svg" type="image/x-icon" />
	    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
	    <title>Подтверждение email</title>
	    <link rel="stylesheet" href="style.css" />
</head>
<body>
	<div class="topbar">
		<div class="top-bar-left">
			<div>
			<a href="index.html"><img src="image/text-logo.svg" alt="logo" width="100" height="20"></a>
			</div>

		</div>

		<div class="butt-top-right">
			<a href="login.html" class="button-top" id="loginBtn"><b>Вход</b></a>
		</div>
	</div>

	<div class="container">
		<img src="image/fa&te.svg" alt="Korvin" width="700" height="100">
		<center><h1>Подтверждение email</h1></center>
		
<div class="card">
<p id="emailText"></p>

<input id="code" placeholder="Введите код">
<button id="verifyBtn">Подтвердить</button>

<div id="status"></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const email = params.get("email");

document.getElementById("emailText").textContent = "Код отправлен на: " + email;

document.getElementById("verifyBtn").onclick = async () => {
  const code = document.getElementById("code").value;

  const res = await fetch("/api/verify-email", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ email, code })
  });

  const data = await res.json();

  if (!res.ok) {
    document.getElementById("status").textContent = data.error;
    return;
  }

  document.getElementById("status").textContent = "Email подтверждён!";

  // 👉 можно редиректнуть на логин
  setTimeout(() => {
    window.location.href = "/login.html";
  }, 1500);
};
</script>

</body>
</html>
