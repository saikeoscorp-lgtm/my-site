<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Подтверждение почты</title>
</head>
<body>

<h2>Подтверди почту</h2>

<p id="emailText"></p>

<input id="code" placeholder="Введите код">
<button id="verifyBtn">Подтвердить</button>

<div id="status"></div>

<script>
const params = new URLSearchParams(window.location.search);
const email = params.get("email");

document.getElementById("emailText").textContent = "Код отправлен на: " + email;

document.getElementById("verifyBtn").onclick = async () => {
  const code = document.getElementById("code").value;

  const res = await fetch("/api/verify-email", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ email, code })
  });

  const data = await res.json();

  if (!res.ok) {
    document.getElementById("status").textContent = data.error;
    return;
  }

  document.getElementById("status").textContent = "Email подтверждён!";

  // 👉 можно редиректнуть на логин
  setTimeout(() => {
    window.location.href = "/login.html";
  }, 1500);
};
</script>

</body>
</html>
